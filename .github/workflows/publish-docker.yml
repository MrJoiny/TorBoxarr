name: publish-docker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-docker
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -count=1 ./...

      - name: Read version metadata
        id: meta
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must contain x.y.z" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          image_repo="mrjoiny/torboxarr"

          {
            printf 'version=%s\n' "$version"
            printf 'major_minor=%s.%s\n' "$major" "$minor"
            printf 'major=%s\n' "$major"
            printf 'image_repo=%s\n' "$image_repo"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4.0.0

      - uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.major_minor }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.major }}
            ${{ steps.meta.outputs.image_repo }}:latest

      - name: Publish summary
        run: |
          echo "Published:"
          echo "  ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}"
          echo "  ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.major_minor }}"
          echo "  ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.major }}"
          echo "  ${{ steps.meta.outputs.image_repo }}:latest"
