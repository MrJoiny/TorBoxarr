name: test-suite

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -count=1 ./...

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

  docker-build-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile -t torboxarr:test .
