name: bump-version

on:
  workflow_dispatch:
    inputs:
      part:
        description: Semantic version part to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - name: Ensure workflow runs from a branch
        if: ${{ !startsWith(github.ref, 'refs/heads/') }}
        run: |
          echo "Run this workflow from a branch ref." >&2
          exit 1

      - name: Bump VERSION
        id: bump
        shell: bash
        env:
          BUMP_PART: ${{ github.event.inputs.part }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must contain x.y.z" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "$BUMP_PART" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump part: $BUMP_PART" >&2
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          printf '%s\n' "$new_version" > VERSION
          printf 'new_version=%s\n' "$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"

      - name: Push version bump
        run: git push origin HEAD:${{ github.ref_name }}
